<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Resume Builder</h1>

  <div class="form">
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="title" placeholder="Job Title">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">
    
    <textarea id="summary" placeholder="Professional Summary"></textarea>
    <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
    <textarea id="experience" placeholder="Experience"></textarea>
    <textarea id="education" placeholder="Education"></textarea>

    <input type="file" id="imageUpload">
    
    <button onclick="generateResume()">Generate Resume</button>
    <button onclick="downloadPDF()">Download PDF</button>
  </div>

  <div id="resume" class="resume">
    <div class="header">
      <img id="profileImage" src="" alt="">
      <h2 id="rName">Your Name</h2>
      <p id="rTitle">Job Title</p>
    </div>

    <div class="section">
      <h3>Contact</h3>
      <p id="rEmail"></p>
      <p id="rPhone"></p>
    </div>

    <div class="section">
      <h3>Summary</h3>
      <p id="rSummary"></p>
    </div>

    <div class="section">
      <h3>Skills</h3>
      <p id="rSkills"></p>
    </div>

    <div class="section">
      <h3>Experience</h3>
      <p id="rExperience"></p>
    </div>

    <div class="section">
      <h3>Education</h3>
      <p id="rEducation"></p>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

</body>
</html>
